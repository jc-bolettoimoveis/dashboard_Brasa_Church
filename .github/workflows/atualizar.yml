name: Atualizar painel Brasa

on:
  schedule:
    - cron: "0 12 * * 1"   # toda segunda-feira, 09:00 de Brasília
  workflow_dispatch:         # botão "Run workflow" para rodar na hora

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Gerar dados a partir da planilha
        run: python build/gerar_dados.py
      - name: Salvar atualização
        run: |
          git config user.name "brasa-bot"
          git config user.email "brasa-bot@users.noreply.github.com"
          git add dados.json
          git diff --cached --quiet || git commit -m "atualização automática dos dados"
          git push
